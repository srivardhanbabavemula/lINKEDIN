name: Weekly Report (Safe — No LinkedIn Login)

# SAFE: no LinkedIn credentials, no scraping, no Ollama required on CI

on:
  schedule:
    - cron: "0 9 * * 0"
  workflow_dispatch:

jobs:
  safe-weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Initialize database
        run: python copilot.py init

      - name: Seed sample data (no LLM)
        run: python copilot.py seed

      - name: Run safe pipeline
        run: python copilot.py run --no-llm --message-limit 5
        env:
          PYTHONUNBUFFERED: "1"

      - name: Verify outputs exist
        run: |
          test -f output/outreach_drafts.csv
          test -f reports/weekly.csv
          echo "Reports generated successfully"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: weekly-reports
          path: |
            output/
            reports/
          if-no-files-found: error
